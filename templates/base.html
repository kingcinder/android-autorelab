<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} · android-autorelab</title>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">AR</div>
          <div class="brand-copy">
            <p class="eyebrow">Android AutoRELab</p>
            <h1>Guided Android Evidence Workflows</h1>
            <p>Start with what you have, review the captured context, then choose the workflow that fits the job.</p>
          </div>
        </div>
        <nav class="topnav" aria-label="Primary">
          <a href="/" class="{% if nav_path == 'startup' %}is-active{% endif %}">Start</a>
          <a href="/runs" class="{% if nav_path == 'runs' %}is-active{% endif %}">Runs</a>
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
      <footer class="footer-mark">
        <span>Read-only by default</span>
        <span>Workflow-scoped outputs</span>
        <span>Evidence first</span>
      </footer>
    </div>
  </body>
</html>
